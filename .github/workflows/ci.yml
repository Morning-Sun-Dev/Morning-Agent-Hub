name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  lint-and-syntax:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Ruff lint
        run: |
          ruff check . --exclude __pycache__

      - name: Syntax check (ast)
        run: |
          python - <<'EOF'
          import ast, os, sys

          errors = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in ["__pycache__", ".git", ".venv", "node_modules"]]
              for f in files:
                  if not f.endswith(".py"):
                      continue
                  path = os.path.join(root, f)
                  try:
                      with open(path, "rb") as fp:
                          ast.parse(fp.read())
                  except SyntaxError as e:
                      errors.append(f"{path}: {e}")

          if errors:
              print("Syntax errors found:")
              for e in errors:
                  print(" ", e)
              sys.exit(1)
          else:
              print(f"All Python files passed syntax check.")
          EOF

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-syntax

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests directory found, skipping."
